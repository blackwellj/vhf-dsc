version: '3.8'

services:
  dsc:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/__pycache__
    command: uvicorn web.app:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - dsc-network

  udp-listener:
    build: .
    ports:
      - "6000:6000/udp"
    volumes:
      - .:/app
    command: python -m cli.main monitor --port 6000
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - dsc-network

networks:
  dsc-network:
    driver: bridge
