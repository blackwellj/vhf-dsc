version: '3.8'

services:
  dsc-monitor:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: dsc-monitor
    ports:
      - "5555:5555/udp"
      - "8000:8000"
    volumes:
      - ./dsc_messages:/app/dsc_messages
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - UDP_PORT=5555
      - SAMPLE_RATE=16000
      - SAVE_DIR=/app/dsc_messages
    restart: unless-stopped
    command: >
      bash -c "
        python -m cli.monitor_server --port 5555 --sample-rate 16000 --save-dir /app/dsc_messages &
        uvicorn web.app:app --host 0.0.0.0 --port 8000
      "
